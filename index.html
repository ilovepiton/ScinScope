<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SkinScope</title>

  <link rel="stylesheet" href="/ScinScope/css/main.css" />
</head>
<body class="home-video-page">

  <div class="video-wallpaper">
    <video id="home-bg-video" autoplay muted loop playsinline>
      <source src="/ScinScope/assets/spa-wallpaper.mp4" type="video/mp4" />
    </video>
  </div>

  <div class="home-video-overlay"></div>

  <header class="site-header transparent-header">
    <a class="logo logo-link" href="/ScinScope/index.html">SkinScope</a>

    <nav>
      <a href="/ScinScope/index.html">Home</a>
      <a href="/ScinScope/pages/scan.html">Face Scan</a>
      <a href="/ScinScope/pages/product-scan.html">Product Scan</a>
      <a href="/ScinScope/pages/account.html">Account</a>
    </nav>
  </header>

  <main class="home-menu-layout">
    <section class="home-glass-card">
      <p class="beta-label">Free beta</p>

      <h1>Your daily AI skin coach</h1>

      <p class="hero-text">
        Scan your face, check skincare products, and track visible skin results with simple daily AI advice.
      </p>

      <div class="hero-buttons">
        <a class="primary-button" href="/ScinScope/pages/scan.html">Start Skin Scan</a>
        <a class="secondary-button glass-button" href="/ScinScope/pages/product-scan.html">Scan Product</a>
      </div>

      <div class="auth-box glass-auth">
        <p>Save your progress and daily results.</p>

        <div class="auth-buttons">
          <a class="secondary-button small-button glass-button" href="/ScinScope/pages/account.html">Login</a>
          <a class="primary-button small-button" href="/ScinScope/pages/account.html">Register</a>
        </div>
      </div>

      <button type="button" class="sound-button" onclick="enableHomeSound()">
        Sound On
      </button>
    </section>

    <section class="home-results-strip">
      <div class="result-image-card">
        <img src="https://i.pinimg.com/736x/27/cd/a5/27cda5917ee7ccff4a2a3427750a3c98.jpg" alt="Skin result example">
      </div>

      <div class="result-image-card result-image-card-main">
        <img src="https://i.pinimg.com/736x/0e/11/ed/0e11edbb092ce83ca658177fb66d8cfd.jpg" alt="Skin result example">
      </div>

      <div class="result-image-card">
        <img src="https://i.pinimg.com/736x/a0/ed/8f/a0ed8f6c762b494d4a51738655d50f7f.jpg" alt="Skin result example">
      </div>
    </section>
  </main>

  <script>
    function enableHomeSound() {
      const video = document.getElementById("home-bg-video");

      if (!video) return;

      video.muted = false;
      video.volume = 0.45;
      video.play();
    }
  </script>

</body>
</html>
