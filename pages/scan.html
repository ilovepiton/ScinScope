<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SkinScope — Face Scan</title>

  <link rel="stylesheet" href="../css/main.css?v=30" />
</head>
<body>

  <header class="site-header">
    <div class="logo">SkinScope</div>

    <nav>
      <a href="../index.html?v=30">Home</a>
      <a href="scan.html?v=30">Face Scan</a>
      <a href="account.html?v=30">Account</a>
    </nav>
  </header>

  <main class="page">
    <section class="card scan-card">
      <p class="beta-label">Beta face scan</p>

      <h1>Take or upload your face photo</h1>

      <p class="hero-text">
        Use your camera or upload a clear face photo. SkinScope will create your demo skincare dashboard.
      </p>

      <div class="scan-actions">
        <button type="button" class="scan-choice-button" onclick="openCameraModal()">
          <span>📸</span>
          <strong>Take Photo</strong>
          <small>Use camera inside the app</small>
        </button>

        <label class="scan-choice-button" for="face-photo">
          <span>🖼️</span>
          <strong>Upload File</strong>
          <small>Choose from your device</small>
        </label>
      </div>

      <input
        id="face-photo"
        class="hidden-file-input"
        type="file"
        accept="image/*"
      />

      <div id="photo-preview" class="photo-preview-large hidden">
        <img id="preview-image" src="" alt="Face preview" />
      </div>

      <div id="selected-photo-actions" class="selected-photo-actions hidden">
        <button type="button" class="secondary-button button-reset" onclick="clearSelectedPhoto()">
          Cancel Photo
        </button>
      </div>

      <button type="button" class="primary-button button-reset analyze-button" onclick="analyzeFacePhoto()">
        Analyze Photo
      </button>
    </section>
  </main>

  <div id="camera-modal" class="camera-modal hidden">
    <div class="camera-window">
      <h2>Take your face photo</h2>

      <video id="camera-video" autoplay playsinline></video>
      <canvas id="camera-canvas" class="hidden"></canvas>

      <div class="camera-actions">
        <button type="button" class="primary-button button-reset" onclick="takeCameraPhoto()">
          Take Photo
        </button>

        <button type="button" class="secondary-button button-reset" onclick="closeCameraModal()">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <script src="../js/app.js?v=30"></script>
</body>
</html>
