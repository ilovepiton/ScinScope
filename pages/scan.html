<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SkinScope — Face Scan</title>

  <link rel="stylesheet" href="/ScinScope/css/main.css?v=70" />
</head>
<body>

  <header class="site-header">
    <div class="logo">SkinScope</div>

    <nav>
      <a href="/ScinScope/index.html?v=70">Home</a>
      <a href="/ScinScope/pages/scan.html?v=70">Face Scan</a>
      <a href="/ScinScope/pages/account.html?v=70">Account</a>
    </nav>
  </header>

  <main class="page">
    <section class="card scan-card">
      <p class="beta-label">Beta face scan</p>

      <h1>Take or upload your face photo</h1>

      <p class="hero-text">
        Use your camera or upload a clear face photo. SkinScope will create your demo skincare dashboard.
      </p>

      <div class="scan-actions">
        <button type="button" id="open-camera-button" class="scan-choice-button">
          <span>📸</span>
          <strong>Take Photo</strong>
          <small>Use camera inside the app</small>
        </button>

        <label class="scan-choice-button" for="face-photo-input">
          <span>🖼️</span>
          <strong>Upload File</strong>
          <small>Choose from your device</small>
        </label>
      </div>

      <input
        id="face-photo-input"
        class="hidden-file-input"
        type="file"
        accept="image/*"
      />

      <div id="photo-preview-box" class="photo-preview-large" hidden>
        <img id="photo-preview-image" src="" alt="Face preview" />
      </div>

      <div id="photo-control-buttons" class="selected-photo-actions" hidden>
        <button type="button" id="cancel-photo-button" class="secondary-button button-reset">
          Cancel Photo
        </button>
      </div>

      <button type="button" id="analyze-photo-button" class="primary-button button-reset analyze-button disabled-button">
        Analyze Photo
      </button>
    </section>
  </main>

  <div id="camera-modal" class="camera-modal" hidden>
    <div class="camera-window">
      <h2>Put your face inside the guide</h2>

      <div class="camera-frame">
        <video id="camera-video" autoplay playsinline></video>

        <div class="face-guide">
          <div class="face-outline"></div>
        </div>
      </div>

      <canvas id="camera-canvas" hidden></canvas>

      <div class="camera-actions">
        <button type="button" id="take-camera-photo-button" class="primary-button button-reset">
          Take Photo
        </button>

        <button type="button" id="close-camera-button" class="secondary-button button-reset">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <script src="/ScinScope/js/app.js?v=70"></script>
</body>
</html>
